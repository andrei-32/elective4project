# CSV Data Processing - CI/CD Pipeline
# Runs on every push and pull_request to main/master
# Processes CSV files from input/ and saves to output/

name: CI - CSV Processing Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Download external CSV dataset
        run: |
          python -m src.download_csv --url "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv" --output "input/external_dataset.csv"

      - name: Run tests and capture all output
        run: pytest tests/ -v > logs/test_results.log 2>&1
      
      - name: Commit and push test results log
        if: always() && github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "CI: Update test results log [skip ci]" || true
          git fetch origin ${{ github.ref_name }}
          git reset --hard HEAD
          git pull --rebase --strategy-option=theirs || git rebase --strategy-option=theirs origin/${{ github.ref_name }} || true
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}

      - name: Upload test results log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-log
          path: logs/test_results.log
          if-no-files-found: warn
  
  process-csv:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download external CSV dataset
        run: |
          python -m src.download_csv --url "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv" --output "input/external_dataset.csv"

      # PRs from forks: GitHub does not provide secrets (security). Alert developers.
      - name: Warn when PR from fork (secrets unavailable)
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "::warning::PR from fork — ENCRYPTION_KEY and other secrets are not available. Output will not be encrypted. For compliance, merge to main branch or use same-repo PRs."
          fi

      - name: Run CSV processing pipeline
        run: python main.py
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          # Set repository variable REQUIRE_ENCRYPTION=true for compliance (fail when key missing)
          REQUIRE_ENCRYPTION: ${{ vars.REQUIRE_ENCRYPTION || 'false' }}

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-csv-output
          path: output/
          if-no-files-found: ignore

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          if-no-files-found: ignore

      # Commit and push output files to repo (on push to main/master, even on failure)
      - name: Commit and push output files
        if: always() && github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "CI: Update processed outputs and logs [skip ci]" || true
          git fetch origin ${{ github.ref_name }}
          git reset --hard HEAD
          git pull --rebase --strategy-option=theirs || git rebase --strategy-option=theirs origin/${{ github.ref_name }} || true
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
